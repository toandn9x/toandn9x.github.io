<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chia sẻ bài tập của Toandn</title>
  <meta name="description" content="Trang bio link đơn giản để chia sẻ nhanh URL, folder và tài liệu cho đồng đội." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="bio-page">
    <section class="profile-card" aria-labelledby="pageTitle">
      <div class="profile-top">
        <div class="author-avatar">TN</div>
        <div>
          <p class="eyebrow">Quick Share</p>
          <h1 id="pageTitle">Chia sẻ link & tài liệu</h1>
        </div>
        <button id="themeToggle" class="theme-btn" type="button" aria-label="Toggle dark mode">🌙</button>
      </div>

      <p class="bio-text">
        Gom các URL, file và folder cần chia sẻ nhanh chóng gọn nhẹ.
      </p>

      <button id="copyPageBtn" class="copy-page-btn" type="button">Copy link trang</button>
    </section>

    <nav class="filter-tabs" id="filterTabs" aria-label="Lọc loại tài nguyên"></nav>

    <section class="search-section" aria-label="Tìm kiếm tài nguyên">
      <label class="search-box" for="searchInput">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Tìm link hoặc tài liệu..." autocomplete="off" />
      </label>
    </section>

    <section aria-labelledby="resourceTitle">
      <h2 id="resourceTitle" class="section-title">Danh sách chia sẻ</h2>
      <ul id="shareList" class="share-list" aria-live="polite"></ul>
    </section>

    <section id="emptyState" class="empty-state" hidden>
      <div>🔎</div>
      <h2>Không tìm thấy tài nguyên</h2>
      <p>Thử từ khóa khác hoặc chọn lại bộ lọc.</p>
    </section>

    <footer class="footer-info" aria-label="Thông tin tác giả và bản quyền">
      <strong id="authorName">Toandn</strong>
      <span id="copyrightText">© 2026 Toandn. All rights reserved.</span>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Đã copy!</div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>

</html>
